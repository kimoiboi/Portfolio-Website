<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <title>Karim Elgendi · Blog</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="stylesheet" th:href="@{/style.css}">
    <script src="https://kit.fontawesome.com/1eeb4b521d.js" crossorigin="anonymous"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body>
    <nav id="navbar">
        <ul>
            <li><a th:href="@{/index.html}">About</a></li>
            <li><a th:href="@{/projects}">Projects</a></li>
            <li><a th:href="@{/blog}">Blog</a></li>
            <li><a href="#contact-section">Contact</a></li>
            <li><a th:href="@{/resume.html}">Resume</a></li>
        </ul>
    </nav>

    <div class="admin-auth-area">
        <a sec:authorize="isAnonymous()" class="admin-auth-link" th:href="@{/login(redirect=${currentPath})}">Sign In</a>

        <div sec:authorize="hasRole('ADMIN')" class="admin-add-wrapper">
            <button class="project-blog-add-button" id="set-dropdown" type="button">
                <span>Add Post</span>
                <i class="fas fa-plus"></i>
            </button>

            <div class="blog-modal-backdrop add-dropdown blog-admin-dropdown" id="dropdown" aria-hidden="true">
                <div class="blog-admin-window" role="dialog" aria-modal="true" aria-labelledby="blogModalTitle">
                    <div class="blog-window-topbar">
                        <div class="blog-window-dots">
                            <span class="blog-dot blog-dot-red"></span>
                            <span class="blog-dot blog-dot-yellow"></span>
                            <span class="blog-dot blog-dot-green"></span>
                        </div>
                        
                        <!-- Will make something with this later -->
                        <h2 id="blogModalTitle" class="blog-modal-title"></h2>

                        <button class="blog-modal-x" id="blogCancel" type="button" aria-label="Close blog form">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <form id="blogPostForm" class="blog-post-form">
                        <label for="blogTitle">Title</label>
                        <input id="blogTitle" name="title" type="text" placeholder="(e.g. My First Blog Post)" required>

                        <label for="blogUrl">URL Slug</label>
                        <input id="blogUrl" name="url" type="text" placeholder="(e.g. my-first-blog-post)">

                        <label for="blogImageFile">Card Image</label>
                        <div class="blog-image-input">
                            <input id="blogImageFile" name="imageFile" type="file" accept="image/*">
                            <input id="blogImageUrl" name="imageUrl" type="hidden">
                        </div>

                        <label for="blogSummary">Summary</label>
                        <textarea id="blogSummary" name="summary" rows="4" placeholder="Short summary displayed on card"></textarea>

                        <label for="blogContent">Content</label>
                        <textarea id="blogContent" name="content" rows="8" placeholder="Write your full blog post here..." required></textarea>

                        <div class="blog-form-actions">
                            <button class="blog-form-primary" type="submit">Post</button>
                            <button class="blog-form-secondary" type="button" id="blogCancelBottom">Cancel</button>
                        </div>

                        <p id="blogFormMessage" class="blog-form-message"></p>
                    </form>
                </div>
            </div>
        </div>

        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="admin-auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="redirect" th:value="${currentPath}" />
            <button type="submit" class="logout-button">Log out</button>
        </form>
    </div>

    <h1 style="text-align: center;">Blog Posts</h1>

    <div class="blog-posts-container" id="blogPostsContainer">
    </div>

    <div id="contact-section">
        <p class="links">
            <a href="https://github.com/kimoiboi" style="text-decoration: none;" target="_blank" rel="noopener">
                <i class="fa fa-github" style="font-size: 41px; color: white; align-items: center;"></i>
            </a>
            &nbsp;•&nbsp;
            <a href="https://www.linkedin.com/in/karim-elgendi-258145258/" style="text-decoration: none;" target="_blank" rel="noopener">
                <i class="fab fa-linkedin" style="font-size: 41px; align-items: center;"></i>
            </a>
            &nbsp;•&nbsp;
            <a href="#contact-form" style="text-decoration: none;">
                <i class="fa fa-envelope" id="email-style"></i>
            </a>
        </p>
    </div>

    <div id="contact-form">
        <form action="https://formspree.io/f/xvzyokgk" method="POST">
            <p style="font-size: 13px;">Howdy — I'll get back to you ASAP.</p>
            <input type="hidden" name="_subject" value="New portfolio contact message">

            <div>
                <label for="userName">Name</label>
                <input id="userName" type="text" name="name" placeholder="Your name" autocomplete="name" required>

                <label for="emailAddress">Email</label>
                <input id="emailAddress" type="email" name="email" placeholder="you@example.com" autocomplete="email" required>

                <label for="sendMessage">Message</label>
                <textarea id="sendMessage" rows="12" cols="60" name="message" placeholder="Write note here..." autocomplete="off" required></textarea>

                <div class="cf-turnstile" data-sitekey="0x4AAAAAADRPO7tw1pPZxZZf"></div>

                <button id="button-style" type="submit">
                    Send <i class="far fa-paper-plane" style="color: white;"></i>
                </button>
            </div>
        </form>
    </div>

    <a href="#navbar" aria-label="Back to top">
        <div class="circle-to-nav">
            <i class="far fa-hand-point-up" style="font-size: 21.3px;"></i>
        </div>
    </a>

    <footer>
        <p style="font-size: 12.3px; text-align: center;">&copy; 2026 Karim Elgendi. All rights reserved.</p>
    </footer>

    <script th:src="@{/scripts/script.js}"></script>
</body>
</html>
