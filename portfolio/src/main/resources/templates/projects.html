<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security"> 
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Karim Elgendi · Projects</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="stylesheet" th:href="@{/style.css}">
    <script src="https://kit.fontawesome.com/1eeb4b521d.js" crossorigin="anonymous"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <nav id ="navbar">
        <ul>
            <li><a href="index.html">About</a></li>
            <li><a th:href="@{/projects-entry}">Projects</a></li>
            <li><a th:href="@{/blogs-entry}">Blog</a></li>
            <li><a href="#contact-section">Contact</a></li>
            <li><a href="resume.html">Resume</a></li>
        </ul>
    </nav>

    <div class="admin-auth-area">
        <a sec:authorize="isAnonymous()" class="admin-auth-link" th:href="@{/login(redirect=${currentPath})}">Sign In</a>

        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="admin-auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="redirect" th:value="${currentPath}" />
            <button type="submit" class="logout-button">Log out</button>
        </form>
    </div>

    <div sec:authorize="hasRole('ADMIN')" class="add-feature">
        <div class="add-position">
            <button class ="project-blog-add-button" id ="set-dropdown"> Add Project <i class="fas fa-plus"></i></button>
            <div class="add-dropdown" id ="dropdown" aria-hidden="true">
                <ul>
                    <li><a href ="#">Random Project</a></li>
                    <hr style ="width: 88%;">
                    <li><a href ="#">Random Project</a></li>
                    <hr style ="width: 88%;">
                    <li><a href ="#">Random Project</a></li>
                    <hr style ="width: 88%;">
                    <li><a href ="#">Random Project</a></li>
                </ul>
            </div>
        </div>
    </div>
    <h1 style ="text-align: center;">GitHub Repository</h1>
    <div class ="recent-project-box" id="projectsContainer">
    </div>

    <div id ="contact-section">
        <p class ="links">
            <a href="https://github.com/kimoiboi" style ="text-decoration: none;" target ="_blank" rel="noopener"><i class="fa fa-github" style="font-size: 41px; color: white; align-items: center;"></i></a>
            &nbsp;•&nbsp;
            <a href="https://www.linkedin.com/in/karim-elgendi-258145258/" style ="text-decoration: none;" target="_blank" rel="noopener"><i class='fab fa-linkedin' style='font-size: 41px; align-items: center;'></i></a>
            &nbsp;•&nbsp;
            <a href="#contact-form" style ="text-decoration: none;"><i class="fa fa-envelope" id ="email-style"></i></a>
        </p>
    </div>
    
    <div id ="contact-form">
        <form action="https://formspree.io/f/xvzyokgk" method="POST">
            <p style ="font-size: 13px;"> Howdy — I'll get back to you ASAP.</p>
            <input type="hidden" name="_subject" value="New portfolio contact message">
            <div>
                <div>
                    <div>
                        <label for="userName">Name</label>
                        <input 
                            id="userName"
                            type="text" 
                            name="name" 
                            placeholder="Your name" 
                            autocomplete="name" 
                            required
                        >
                    </div>
                    <div>
                        <label for="emailAddress">Email</label>
                        <input 
                            id="emailAddress"
                            type="email" 
                            name="email" 
                            placeholder="you@example.com" 
                            autocomplete="email" 
                            required
                        >
                    </div>
                </div>
                <div>
                    <label for="sendMessage">Message</label>
                    <textarea 
                        id="sendMessage"
                        rows="12" 
                        cols="60" 
                        name="message" 
                        placeholder="Write note here..." 
                        autocomplete="off" 
                        required
                    ></textarea>
                </div>
                <div class="cf-turnstile" data-sitekey="0x4AAAAAADRPO7tw1pPZxZZf"></div>
                <button id="button-style" type="submit">
                    Send <i class="far fa-paper-plane" style="color: white;"></i>
                </button>
            </div> 
        </form>
    </div>

        <a href="#navbar" aria-label="Back to top"><div class ="circle-to-nav"><i class='far fa-hand-point-up' style ="font-size: 21.3px;"></i></div></a>

    <footer>
        <p style = "font-size: 12.3px; text-align: center;">&copy; 2026 Karim Elgendi. All rights reserved.</p>
    </footer>

    <script th:src="@{/scripts/script.js}"></script>
</body>
</html>
